name: Deploy Jekyll
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: list file_commands contents after checkout
        run: |
          echo "=== file_commands dir after checkout step ==="
          ls -la /home/runner/work/_temp/_runner_file_commands/ 2>&1 || echo "(dir missing)"
          echo "=== Files content ==="
          for f in /home/runner/work/_temp/_runner_file_commands/*; do
            [ -f "$f" ] && echo "--- $f ---" && head -c 500 "$f" && echo ""
          done
      - uses: actions/configure-pages@v4
      - name: list file_commands AFTER configure-pages
        run: |
          echo "=== file_commands dir after configure-pages step ==="
          ls -la /home/runner/work/_temp/_runner_file_commands/ 2>&1
          echo "=== Filenames + contents ==="
          for f in /home/runner/work/_temp/_runner_file_commands/*; do
            [ -f "$f" ] && echo "--- $(basename $f) ---" && head -c 500 "$f" && echo ""
          done
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3
        if: always()